<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entertainment + Search</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css"> 

<style>
/* Ensure the body styles match the entertainment theme */
body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); /* Entertainment colors */
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    color: white;
}

/* Custom styling for mode buttons */
.mode-btn {
    transition: all 0.3s;
    font-weight: 600;
}
.mode-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}
.btn-active {
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
    border: 2px solid white;
}
.result-card {
    /* Style local search results */
    width: 200px; 
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s;
}
.result-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}
.hidden { display: none; }
</style>
</head>
<body class="bg-gradient-to-r from-red-500 to-pink-500 flex flex-col items-center">
    <a href="/" class="text-white text-lg absolute top-4 left-4 hover:text-pink-300">← Back to Modes</a>
    <h1 class="text-4xl font-bold text-white mt-10 mb-8">🎧 Multimodal Fun Search</h1>
    
    <div class="w-full max-w-4xl p-6 bg-white/10 backdrop-blur-md rounded-2xl shadow-xl">
        
        <div class="flex justify-center space-x-4 mb-6">
            <button id="textSearchBtn" class="mode-btn btn-active bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-lg">Local Text Search</button>
            <button id="fusionSearchBtn" class="mode-btn bg-yellow-500 hover:bg-yellow-600 text-white p-3 rounded-lg">Fusion Search</button>
            <button id="onlineImageSearchBtn" class="mode-btn bg-green-500 hover:bg-green-600 text-white p-3 rounded-lg">Online Images</button>
            <button id="musicSearchBtn" class="mode-btn bg-purple-500 hover:bg-purple-600 text-white p-3 rounded-lg">YouTube Music</button>
        </div>

        <div class="flex space-x-3 w-full mb-4">
            <input type="text" id="query" placeholder="Search for anything..." 
                   class="flex-grow p-3 rounded-xl border-2 border-transparent focus:border-red-500 focus:outline-none transition duration-300 shadow-inner text-gray-800">
            <button id="searchBtn" 
                    class="bg-red-600 hover:bg-red-700 transition duration-300 px-8 py-3 rounded-xl text-white font-bold shadow-lg transform hover:scale-105">
                Go
            </button>
        </div>
        
        <div id="uploadSection" class="hidden flex flex-col items-center space-y-2 mb-4">
            <label for="imageUpload" class="text-white font-medium">Upload Image for Fusion (Optional):</label>
            <input type="file" id="imageUpload" name="image" accept="image/*" class="p-2 bg-white/30 rounded-lg text-white">
        </div>

        <div id="status" class="text-center text-yellow-300 font-bold mb-4"></div>
    </div>

    <div id="mainPlayer" class="w-full max-w-4xl text-center mt-6">
        </div>

    <div id="results" class="flex flex-wrap gap-4 justify-center w-full max-w-4xl mt-6">
        </div>

    <script src="/static/entertain.js"></script>
</body>
</html>
